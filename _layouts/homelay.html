---
layout: default
---

<div id="homeid" class="col-md-8 col-sm-7 home-main nopadding-left">
	<div id="carousel" class="carousel slide" data-ride="carousel" data-interval="false" data-pause="hover" >
		<!-- Menu -->
		<ol class="carousel-indicators">
			<li data-target="#carousel" data-slide-to="0" class="active"></li>
			<li data-target="#carousel" data-slide-to="1"></li>
			<li data-target="#carousel" data-slide-to="2"></li>
			<li data-target="#carousel" data-slide-to="3"></li>
			<li data-target="#carousel" data-slide-to="4"></li>
		</ol>

		<!-- Items -->
		<div class="carousel-inner" markdown="0">
			<div class="item active">
				<a href="https://genome.cshlp.org/content/early/2026/06/16/gr281559125" target="_blank" rel="noopener noreferrer">
					<img src="{{ site.url }}{{ site.baseurl }}/images/slider/spCorr-genome-research.png?v={{ site.time | date: '%s' }}" alt="Genome Research page for the spCorr paper" />
				</a>
			</div>
			<div class="item">
				<img src="{{ site.url }}{{ site.baseurl }}/images/slider/uconnhealth.jpg" alt="UConn Health campus" />
			</div>
			<div class="item">
				<img src="{{ site.url }}{{ site.baseurl }}/images/slider/building.jpg" alt="UConn Health building exterior" />
			</div>
			<div class="item">
				<img src="{{ site.url }}{{ site.baseurl }}/images/slider/Department.jpg" alt="Department of Genetics and Genome Sciences" />
			</div>
			<div class="item">
				<img src="{{ site.url }}{{ site.baseurl }}/images/slider/scDesign3.jpg" alt="scDesign3 research graphic" />
			</div>
		</div>
		<a class="left carousel-control" href="#carousel" role="button" data-slide="prev">
		<span class="glyphicon glyphicon-chevron-left" aria-hidden="true"></span>
		<span class="sr-only">Previous</span>
		</a>
		<a class="right carousel-control" href="#carousel" role="button" data-slide="next">
		<span class="glyphicon glyphicon-chevron-right" aria-hidden="true"></span>
		<span class="sr-only">Next</span>
		</a>
	</div>

	{{ content }}
</div>

<div id="newsid" class="col-md-4 col-sm-5 home-news nopadding-right" >
	{% include tweets.html %}
</div>
